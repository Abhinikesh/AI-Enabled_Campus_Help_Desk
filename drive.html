<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Drive - CampusSphere AI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Animated Star Background -->
  <div class="animated-bg"></div>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-graduation-cap"></i>
        CampusSphere AI
      </a>
      <ul class="nav-links" id="navLinks">
        <!-- Nav links will be dynamically generated -->
      </ul>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>

  <!-- Drive Container -->
  <div class="drive-container">
    <div class="drive-header">
      <h1><i class="fas fa-cloud"></i> Your Drive</h1>
      <div class="drive-actions">
        <button class="btn btn-secondary" id="createFolderBtn">
          <i class="fas fa-folder-plus"></i> New Folder
        </button>
        <label for="fileUpload" class="btn btn-primary">
          <i class="fas fa-upload"></i> Upload File
          <input type="file" id="fileUpload" multiple style="display: none;">
        </label>
      </div>
    </div>

    <div class="drive-content">
      <div class="drive-files" id="driveFiles">
        <div class="empty-drive">
          <i class="fas fa-cloud"></i>
          <h3>Your drive is empty</h3>
          <p>Upload files or create folders to get started</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Create Folder Modal -->
  <div class="folder-modal" id="folderModal">
    <div class="modal-content">
      <h3>Create New Folder</h3>
      <input type="text" id="folderName" placeholder="Folder name" />
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelFolderBtn">Cancel</button>
        <button class="btn btn-primary" id="createFolderConfirmBtn">Create</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/drive.js"></script>
</body>
</html>
