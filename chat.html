<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Help Desk - CampusSphere AI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Animated Star Background -->
  <div class="animated-bg"></div>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-graduation-cap"></i>
        CampusSphere AI
      </a>
      <ul class="nav-links" id="navLinks">
        <!-- Nav links will be dynamically generated -->
      </ul>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>

  <!-- Chat Container -->
  <div class="chat-container">
    <div class="chat-header">
      <div>
        <h2><i class="fas fa-robot"></i> Campus AI Assistant</h2>
        <p style="font-size: 0.875rem; opacity: 0.9;">Select an agent to get started</p>
      </div>
      <div class="chat-controls">
        <select id="agentSelector" class="agent-selector">
          <option value="academic">Academic Agent</option>
          <option value="admin">Admin Agent</option>
          <option value="navigation">Navigation Agent</option>
          <option value="complaint">Complaint Agent</option>
          <option value="placement">Placement Agent</option>
        </select>
        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="hi">HI</button>
        </div>
        <button class="voice-btn" id="voiceBtn" title="Voice Input">
          <i class="fas fa-microphone"></i>
        </button>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message ai">
        <div>
          <div class="message-bubble">
            Hello! I'm your Campus AI Assistant. How can I help you today?
          </div>
          <div class="message-time">Just now</div>
        </div>
      </div>
    </div>
    <div class="chat-input-container">
      <div class="chat-input-wrapper">
        <input type="text" id="chatInput" class="chat-input" placeholder="Type your message here..." />
        <button id="sendBtn" class="send-btn">
          <i class="fas fa-paper-plane"></i> Send
        </button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
