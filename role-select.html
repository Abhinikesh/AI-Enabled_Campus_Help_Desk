<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - CampusSphere AI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="role-select-container">
    <div class="role-select-content">
      <div class="role-select-header">
        <h1><i class="fas fa-graduation-cap"></i> CampusSphere AI</h1>
        <p>Who are you?</p>
      </div>
      <div class="role-grid">
        <div class="role-card" data-role="student">
          <div class="role-icon">
            <i class="fas fa-user-graduate"></i>
          </div>
          <h3>Student</h3>
        </div>
        <div class="role-card" data-role="faculty">
          <div class="role-icon">
            <i class="fas fa-chalkboard-teacher"></i>
          </div>
          <h3>Faculty / Teacher</h3>
        </div>
        <div class="role-card" data-role="parent">
          <div class="role-icon">
            <i class="fas fa-users"></i>
          </div>
          <h3>Parent</h3>
        </div>
        <div class="role-card" data-role="new_admission">
          <div class="role-icon">
            <i class="fas fa-user-plus"></i>
          </div>
          <h3>New Admission</h3>
        </div>
        <div class="role-card" data-role="admin">
          <div class="role-icon">
            <i class="fas fa-user-shield"></i>
          </div>
          <h3>College Admin</h3>
        </div>
      </div>
    </div>
  </div>

  <!-- Login Modal (for Student & Faculty) -->
  <div class="login-modal" id="loginModal">
    <div class="login-content">
      <h2 id="loginTitle">Login</h2>
      <form id="loginForm">
        <div id="loginError" style="color: #ef4444; margin-bottom: 1rem; font-size: 0.875rem; text-align: center; display: none;"></div>
        <div class="form-group">
          <label id="idLabel" for="userId">Roll Number</label>
          <input type="text" id="userId" name="userId" placeholder="Enter your roll number" required>
        </div>
        <div class="form-group" id="secondaryFieldGroup">
          <label id="secondaryLabel" for="userSecondary">Password</label>
          <input type="password" id="userSecondary" name="userSecondary" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">
          Continue
        </button>
      </form>
    </div>
  </div>

  <script src="js/role-select.js"></script>
</body>
</html>
