<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complaint System - CampusSphere AI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Animated Star Background -->
  <div class="animated-bg"></div>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-graduation-cap"></i>
        CampusSphere AI
      </a>
      <ul class="nav-links" id="navLinks">
        <!-- Nav links will be dynamically generated -->
      </ul>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>

  <!-- Helpdesk Container -->
  <div class="helpdesk-container">
    <h1 style="text-align: center; margin: 2rem 0; font-size: 2.5rem; color: var(--text-dark);">
      <i class="fas fa-tools"></i> Smart Complaint System
    </h1>
    
    <div class="helpdesk-grid">
      <!-- Complaint Form -->
      <div class="complaint-form">
        <h2 style="margin-bottom: 1.5rem; color: var(--text-dark);">
          <i class="fas fa-file-alt"></i> File a Complaint
        </h2>
        <div class="ticket-id" id="ticketId">
          Ticket ID: <span id="ticketNumber">TKT-2024-000</span>
        </div>
        <form id="complaintForm">
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" required>
              <option value="">Select Category</option>
              <option value="WiFi">WiFi</option>
              <option value="Water">Water</option>
              <option value="Electricity">Electricity</option>
              <option value="Cleanliness">Cleanliness</option>
              <option value="Infrastructure">Infrastructure</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" placeholder="e.g., Hostel Block A, Room 205" required>
          </div>
          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Describe your issue in detail..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">
            <i class="fas fa-paper-plane"></i> Submit Complaint
          </button>
        </form>
        <div class="ai-suggestion" id="aiSuggestion" style="display: none;">
          <h4><i class="fas fa-robot"></i> AI Suggestion</h4>
          <p id="suggestionText"></p>
        </div>
      </div>

      <!-- Complaint Status -->
      <div class="complaints-status">
        <div class="status-card">
          <h3><i class="fas fa-clock"></i> Open Complaints</h3>
          <div id="openComplaints"></div>
        </div>
        <div class="status-card">
          <h3><i class="fas fa-spinner"></i> In Progress</h3>
          <div id="progressComplaints"></div>
        </div>
        <div class="status-card">
          <h3><i class="fas fa-check-circle"></i> Resolved</h3>
          <div id="resolvedComplaints"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Generate ticket ID
    function generateTicketId() {
      const year = new Date().getFullYear();
      const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
      return `TKT-${year}-${random}`;
    }

    // Initialize ticket ID
    document.getElementById('ticketNumber').textContent = generateTicketId();

    // Load complaints
    function loadComplaints() {
      const complaints = campusData.complaints;
      const openDiv = document.getElementById('openComplaints');
      const progressDiv = document.getElementById('progressComplaints');
      const resolvedDiv = document.getElementById('resolvedComplaints');

      openDiv.innerHTML = '';
      progressDiv.innerHTML = '';
      resolvedDiv.innerHTML = '';

      complaints.forEach(complaint => {
        const complaintHTML = `
          <div class="complaint-item">
            <h4>${complaint.id}</h4>
            <p><strong>Category:</strong> ${complaint.category}</p>
            <p><strong>Location:</strong> ${complaint.location}</p>
            <p><strong>Date:</strong> ${complaint.date}</p>
            <span class="status-badge status-${complaint.status.toLowerCase().replace(' ', '-')}">${complaint.status}</span>
          </div>
        `;

        if (complaint.status === 'Open') {
          openDiv.innerHTML += complaintHTML;
        } else if (complaint.status === 'In Progress') {
          progressDiv.innerHTML += complaintHTML;
        } else if (complaint.status === 'Resolved') {
          resolvedDiv.innerHTML += complaintHTML;
        }
      });
    }

    // Handle form submission
    document.getElementById('complaintForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const category = document.getElementById('category').value;
      const location = document.getElementById('location').value;
      const description = document.getElementById('description').value;
      
      // Generate AI suggestion based on category
      const suggestions = {
        'WiFi': 'Try restarting your router and device. If issue persists, contact IT Support at ext. 1234.',
        'Water': 'Contact Maintenance Office immediately at ext. 5678. For emergencies, call Security: ext. 0000.',
        'Electricity': 'Report to Electrical Maintenance team at ext. 9012. Do not attempt repairs yourself.',
        'Cleanliness': 'Housekeeping team will address this within 1-2 hours. Thank you for reporting.',
        'Infrastructure': 'Your complaint has been forwarded to the Infrastructure team. Expected response: 24 hours.',
        'Other': 'Your complaint has been logged. Our team will review and respond within 48 hours.'
      };

      const suggestion = suggestions[category] || 'Your complaint has been logged. Our team will review and respond soon.';
      
      // Show AI suggestion
      document.getElementById('suggestionText').textContent = suggestion;
      document.getElementById('aiSuggestion').style.display = 'block';

      // Add to complaints list (in real app, this would be sent to backend)
      const newComplaint = {
        id: document.getElementById('ticketNumber').textContent,
        category: category,
        location: location,
        description: description,
        status: 'Open',
        date: new Date().toISOString().split('T')[0],
        aiSuggestion: suggestion
      };

      campusData.complaints.unshift(newComplaint);
      loadComplaints();

      // Reset form
      this.reset();
      document.getElementById('ticketNumber').textContent = generateTicketId();
      
      // Scroll to suggestion
      document.getElementById('aiSuggestion').scrollIntoView({ behavior: 'smooth' });
    });

    // Load complaints on page load
    loadComplaints();
  </script>
</body>
</html>
