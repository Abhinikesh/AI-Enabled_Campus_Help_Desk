<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - CampusSphere AI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- Animated Star Background -->
  <div class="animated-bg"></div>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fas fa-graduation-cap"></i>
        CampusSphere AI
      </a>
      <ul class="nav-links" id="navLinks">
        <!-- Nav links will be dynamically generated -->
      </ul>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>

  <!-- Dashboard Container -->
  <div class="dashboard-container">
    <div class="dashboard-header">
      <h1 style="font-size: 2.5rem; color: var(--text-dark); margin-bottom: 0.5rem;">
        <i class="fas fa-chart-line"></i> Admin Dashboard
      </h1>
      <p style="color: var(--text-light);">Real-time analytics and insights</p>
    </div>

    <!-- Stats Cards -->
    <div class="dashboard-stats">
      <div class="stat-card">
        <h3>Total Queries</h3>
        <div class="stat-value" id="totalQueries">0</div>
        <div class="stat-label">All time</div>
      </div>
      <div class="stat-card">
        <h3>Most Used Agent</h3>
        <div class="stat-value" id="mostUsedAgent" style="font-size: 1.5rem;">-</div>
        <div class="stat-label">Popular choice</div>
      </div>
      <div class="stat-card">
        <h3>Active Complaints</h3>
        <div class="stat-value" id="activeComplaints">0</div>
        <div class="stat-label">Requiring attention</div>
      </div>
      <div class="stat-card">
        <h3>Resolution Rate</h3>
        <div class="stat-value" id="resolutionRate">0%</div>
        <div class="stat-label">This month</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="dashboard-charts">
      <div class="chart-card">
        <h3><i class="fas fa-chart-line"></i> Daily Queries</h3>
        <div class="chart-container">
          <canvas id="dailyQueriesChart"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <h3><i class="fas fa-chart-bar"></i> Issue Categories</h3>
        <div class="chart-container">
          <canvas id="issueCategoriesChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Recent Complaints Table -->
    <div class="complaints-table">
      <h3><i class="fas fa-table"></i> Recent Complaints</h3>
      <table>
        <thead>
          <tr>
            <th>Ticket ID</th>
            <th>Category</th>
            <th>Status</th>
            <th>Date</th>
            <th>Priority</th>
          </tr>
        </thead>
        <tbody id="complaintsTableBody">
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    // Check admin access
    document.addEventListener('DOMContentLoaded', function() {
      const userRole = localStorage.getItem('userRole');
      if (userRole !== 'admin') {
        alert('Access denied. Dashboard is only for College Admin.');
        window.location.href = 'index.html';
        return;
      }
    });
  </script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
